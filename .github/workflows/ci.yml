name: Continuous Integration

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    name: Lint & Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Pytest & Service Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest fastapi httpx pydantic sqlalchemy asyncpg alembic aio-pika redis stripe sse-starlette

      - name: Run Pytest Suite
        run: |
          pytest tests/

  docker-build:
    name: Verify Docker Builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify API Gateway Build
        run: docker build -t gateway:test -f api_gateway/Dockerfile .

      - name: Verify Auth Service Build
        run: docker build -t auth:test -f auth_service/Dockerfile .

      - name: Verify AI Service Build
        run: docker build -t ai:test -f ai_service/Dockerfile .
